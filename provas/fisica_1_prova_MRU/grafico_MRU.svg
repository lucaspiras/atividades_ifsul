<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" width="720" height="480" style="background:white; font-family: 'Times New Roman', Times, serif;">

  <!-- Título -->
  <text x="360" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#111">Posição em função do tempo</text>

  <!-- Definições da área do gráfico -->
  <!-- Origem do gráfico em (80, 420), largura=580, altura=340 -->
  <!-- t: 0–10 → x: 80–660  (580px / 10 = 58px por s) -->
  <!-- x: 0–30 → y: 420–80  (340px / 30 ≈ 11.33px por m) -->

  <!-- Linhas de grade verticais (t = 1 a 10) -->
  <g stroke="#ccc" stroke-width="0.8">
    <line x1="138" y1="80" x2="138" y2="420"/> <!-- t=1 -->
    <line x1="196" y1="80" x2="196" y2="420"/> <!-- t=2 -->
    <line x1="254" y1="80" x2="254" y2="420"/> <!-- t=3 -->
    <line x1="312" y1="80" x2="312" y2="420"/> <!-- t=4 -->
    <line x1="370" y1="80" x2="370" y2="420"/> <!-- t=5 -->
    <line x1="428" y1="80" x2="428" y2="420"/> <!-- t=6 -->
    <line x1="486" y1="80" x2="486" y2="420"/> <!-- t=7 -->
    <line x1="544" y1="80" x2="544" y2="420"/> <!-- t=8 -->
    <line x1="602" y1="80" x2="602" y2="420"/> <!-- t=9 -->
    <line x1="660" y1="80" x2="660" y2="420"/> <!-- t=10 -->
  </g>

  <!-- Linhas de grade horizontais (x = 5, 10, 15, 20, 25, 30) -->
  <!-- x=5  → y = 420 - (5/30)*340  = 420 - 56.67 = 363.3 -->
  <!-- x=10 → y = 420 - (10/30)*340 = 420 - 113.3 = 306.7 -->
  <!-- x=15 → y = 420 - (15/30)*340 = 420 - 170   = 250   -->
  <!-- x=20 → y = 420 - (20/30)*340 = 420 - 226.7 = 193.3 -->
  <!-- x=25 → y = 420 - (25/30)*340 = 420 - 283.3 = 136.7 -->
  <!-- x=30 → y = 420 - (30/30)*340 = 420 - 340   = 80    -->
  <g stroke="#ccc" stroke-width="0.8">
    <line x1="80" y1="363" x2="660" y2="363"/>
    <line x1="80" y1="307" x2="660" y2="307"/>
    <line x1="80" y1="250" x2="660" y2="250"/>
    <line x1="80" y1="193" x2="660" y2="193"/>
    <line x1="80" y1="137" x2="660" y2="137"/>
    <line x1="80" y1="80"  x2="660" y2="80"/>
  </g>

  <!-- Eixos -->
  <g stroke="#111" stroke-width="2">
    <!-- Eixo X (horizontal) -->
    <line x1="80" y1="420" x2="670" y2="420"/>
    <!-- Eixo Y (vertical) -->
    <line x1="80" y1="420" x2="80" y2="70"/>
  </g>

  <!-- Setas dos eixos -->
  <polygon points="670,420 658,415 658,425" fill="#111"/>
  <polygon points="80,70 75,82 85,82" fill="#111"/>

  <!-- Marcações eixo t (horizontal) -->
  <g font-size="13" text-anchor="middle" fill="#222">
    <g stroke="#111" stroke-width="1.5">
      <line x1="80"  y1="420" x2="80"  y2="428"/>
      <line x1="138" y1="420" x2="138" y2="428"/>
      <line x1="196" y1="420" x2="196" y2="428"/>
      <line x1="254" y1="420" x2="254" y2="428"/>
      <line x1="312" y1="420" x2="312" y2="428"/>
      <line x1="370" y1="420" x2="370" y2="428"/>
      <line x1="428" y1="420" x2="428" y2="428"/>
      <line x1="486" y1="420" x2="486" y2="428"/>
      <line x1="544" y1="420" x2="544" y2="428"/>
      <line x1="602" y1="420" x2="602" y2="428"/>
      <line x1="660" y1="420" x2="660" y2="428"/>
    </g>
    <text x="80"  y="445">0</text>
    <text x="138" y="445">1</text>
    <text x="196" y="445">2</text>
    <text x="254" y="445">3</text>
    <text x="312" y="445">4</text>
    <text x="370" y="445">5</text>
    <text x="428" y="445">6</text>
    <text x="486" y="445">7</text>
    <text x="544" y="445">8</text>
    <text x="602" y="445">9</text>
    <text x="660" y="445">10</text>
  </g>

  <!-- Marcações eixo x (vertical) -->
  <g font-size="13" text-anchor="end" fill="#222">
    <g stroke="#111" stroke-width="1.5">
      <line x1="80" y1="363" x2="72" y2="363"/>
      <line x1="80" y1="307" x2="72" y2="307"/>
      <line x1="80" y1="250" x2="72" y2="250"/>
      <line x1="80" y1="193" x2="72" y2="193"/>
      <line x1="80" y1="137" x2="72" y2="137"/>
      <line x1="80" y1="80"  x2="72" y2="80"/>
    </g>
    <text x="68" y="367">5</text>
    <text x="68" y="311">10</text>
    <text x="68" y="254">15</text>
    <text x="68" y="197">20</text>
    <text x="68" y="141">25</text>
    <text x="68" y="84">30</text>
  </g>

  <!-- Rótulos dos eixos -->
  <!-- Eixo t -->
  <text x="680" y="424" font-size="15" font-style="italic" fill="#111">t (s)</text>
  <!-- Eixo x (vertical) — rotacionado -->
  <text transform="rotate(-90,30,250)" x="30" y="250" text-anchor="middle" font-size="15" font-style="italic" fill="#111">x (m)</text>

  <!-- Reta do MRU: x(t) = 10 + 2t -->
  <!-- Ponto (0, 10): pixel_x=80, pixel_y = 420 - (10/30)*340 = 420 - 113.3 = 306.7 ≈ 307 -->
  <!-- Ponto (10, 30): pixel_x=660, pixel_y = 420 - (30/30)*340 = 420 - 340 = 80 -->
  <line x1="80" y1="307" x2="660" y2="80" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Ponto (0, 10) -->
  <circle cx="80" cy="307" r="5" fill="#111"/>

  <!-- Ponto (10, 30) -->
  <circle cx="660" cy="80" r="5" fill="#111"/>

</svg>
