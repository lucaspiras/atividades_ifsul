<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta de Resultado – Prova de Física</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="consulta.css">
</head>
<body>

<header role="banner">
  <div class="header-top">
    <img src="logo_ifsul_horizontal.png" alt="Logo do IFSul" class="header-logo">
    <h1>Resultado da Prova</h1>
    <p class="header-subtitle">Física – Unidades de Medida e MRU</p>
  </div>
</header>

<div class="exam-info-box">
  <dl class="exam-info-grid">
    <div class="exam-info-item"><dt>Série</dt><dd>2º Ano</dd></div>
    <div class="exam-info-item"><dt>Disciplina</dt><dd>Física I</dd></div>
    <div class="exam-info-item"><dt>Questões</dt><dd>20</dd></div>
  </dl>
</div>

<main id="main-content" role="main">

  <div class="search-card">
    <h2>Digite seu nome e sua palavra secreta para consultar o resultado</h2>
    <div class="search-row">
      <input type="text" id="nome-busca" class="search-input"
        placeholder="Seu nome completo"
        autocomplete="name"
        aria-label="Nome do aluno">
      <input type="text" id="palavra-busca" class="search-input"
        placeholder="Palavra secreta"
        autocomplete="off"
        aria-label="Palavra secreta">
      <button id="btn-buscar" class="btn-search">Consultar</button>
    </div>
    <p id="search-error" role="alert"></p>
  </div>

  <div id="result-section" aria-live="polite">

    <div class="score-panel">
      <p class="student-name" id="res-nome"></p>
      <div class="score-value" id="res-score"></div>
      <p class="score-sub" id="res-detalhe"></p>
    </div>

    <div id="questoes-resultado"></div>

  </div>

</main>

<footer role="contentinfo">
  Prova de Física – 2º Ano &nbsp;|&nbsp; IFSul
</footer>

<script src="consulta.js"></script>
</body>
</html>
